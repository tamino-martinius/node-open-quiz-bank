name: CI
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['22.x', '24.x', '26.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node }}', cache: npm }
      - run: npm ci
      - name: Test source (lint + vitest)
        run: npm test
      - name: Helper script unit tests
        run: npm run test:scripts
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: lts/*, cache: npm }
      - run: npm ci
      - run: npm run compile
      - run: npm pack
      - uses: actions/upload-artifact@v4
        with: { name: package-tarball, path: '*.tgz', if-no-files-found: error }
  verify-package:
    needs: pack
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['22.x', '24.x', '26.x']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ matrix.node }}', cache: npm }
      - run: npm ci
      - uses: actions/download-artifact@v4
        with: { name: package-tarball }
      - name: Verify packaged artifact (CJS + ESM + types)
        shell: bash
        run: node .github/scripts/verify-packaged.mjs "$(ls open-quiz-bank-*.tgz | head -1)"
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: lts/*, cache: npm }
      - run: npm ci
      - run: npm run ci
      - uses: codecov/codecov-action@v5
        with: { token: '${{ secrets.CODECOV_TOKEN }}', fail_ci_if_error: false }
